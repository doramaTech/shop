<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">

<title>Atlas Povos Originários</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

:root{

--primary:#C85A3A;
--secondary:#B8860B;
--background:#F5F5F0;
--border:#D4A574;

}

body{

margin:0;
font-family:Arial;
background:var(--background);

}

/* GRID PRINCIPAL */

.layout{

display:grid;

grid-template-columns:260px 1fr 360px;

height:100vh;

}

/* SIDEBAR ESQUERDA */

.sidebar{

background:white;

border-right:1px solid var(--border);

padding:20px;

overflow:auto;

}

.sidebar h3{

margin-top:0;

}

.filter{

padding:8px;

border-radius:6px;

cursor:pointer;

margin-bottom:6px;

}

.filter:hover{

background:#eee;

}

.filter.active{

background:var(--primary);

color:white;

}

/* MAPA */

#map{

height:100%;

}

/* SIDEBAR DIREITA */

.details{

background:white;

border-left:1px solid var(--border);

padding:20px;

overflow:auto;

}

.details img{

width:100%;

border-radius:8px;

margin-bottom:10px;

}

.label{

font-weight:bold;

margin-top:10px;

}

/* MOBILE */

@media(max-width:1000px){

.layout{

grid-template-columns:1fr;

}

.sidebar{

position:absolute;

z-index:1000;

width:260px;

height:100%;

}

.details{

display:none;

}

}

</style>

</head>

<body>

<div class="layout">

<!-- FILTROS -->

<div class="sidebar">

<h3>Biorregiões</h3>

<div id="regions"></div>

<h3 style="margin-top:20px">Categorias</h3>

<div id="categories"></div>

</div>



<!-- MAPA -->

<div id="map"></div>



<!-- DETALHES -->

<div class="details">

<h3>Item selecionado</h3>

<div id="itemDetails">

Clique em um pino no mapa

</div>

</div>

</div>



<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ========================
PRODUTOS
======================== */

const products=[

{

id:"mesa-karuara",

name:"Mesas Karuara",

origin:"Amaturá – AM",

region:"Amazônia",

category:"Marcenaria",

technique:"Madeira reaproveitada",

description:"Conjunto inspirado nos Karuara",

image:"https://picsum.photos/400/300?1",

lat:-3.3,

lng:-64.7

},

{

id:"cachimbo-kariri",

name:"Cachimbo Kariri Xocó",

origin:"Kariri Xocó – AL",

region:"Nordeste",

category:"Artesanato Tradicional",

technique:"Produção manual",

description:"Produção tradicional do povo Kariri",

image:"https://picsum.photos/400/300?2",

lat:-10.2,

lng:-36.7

},

{

id:"colar-tikuna",

name:"Colares Tikuna",

origin:"Tikuna – AM",

region:"Amazônia",

category:"Biojoias",

technique:"Sementes naturais",

description:"Produzido com sementes sagradas",

image:"https://picsum.photos/400/300?3",

lat:-3.8,

lng:-70.2

}

]



const regions=[

"Todos",

"Amazônia",

"Nordeste"

]



const categories=[

"Todos",

"Marcenaria",

"Artesanato Tradicional",

"Biojoias"

]



/* ========================
MAPA
======================== */

const map=L.map('map').setView([-10,-55],4)

L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'

).addTo(map)



let markers=[]



function renderMarkers(list){

markers.forEach(m=>map.removeLayer(m))

markers=[]



list.forEach(p=>{

const marker=L.marker([p.lat,p.lng]).addTo(map)



marker.on("click",()=>showDetails(p))



markers.push(marker)

})

}



renderMarkers(products)



/* ========================
DETALHES
======================== */

function showDetails(p){

const box=document.getElementById("itemDetails")

box.innerHTML=`

<img src="${p.image}">

<div class="label">Nome</div>
${p.name}

<div class="label">Origem</div>
${p.origin}

<div class="label">Categoria</div>
${p.category}

<div class="label">Técnica</div>
${p.technique}

<div class="label">Descrição</div>
${p.description}

`

}



/* ========================
FILTROS
======================== */

let regionFilter="Todos"

let categoryFilter="Todos"



function applyFilters(){

let list=products



if(regionFilter!=="Todos")

list=list.filter(p=>p.region===regionFilter)



if(categoryFilter!=="Todos")

list=list.filter(p=>p.category===categoryFilter)



renderMarkers(list)

}



/* REGIÕES */

const regionBox=document.getElementById("regions")

regions.forEach(r=>{

const el=document.createElement("div")

el.className="filter"

el.innerText=r

el.onclick=()=>{

regionFilter=r

applyFilters()

}

regionBox.appendChild(el)

})



/* CATEGORIAS */

const catBox=document.getElementById("categories")

categories.forEach(c=>{

const el=document.createElement("div")

el.className="filter"

el.innerText=c

el.onclick=()=>{

categoryFilter=c

applyFilters()

}

catBox.appendChild(el)

})



</script>

</body>

</html>
