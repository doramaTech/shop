<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<title>Ateliê Povos Originários</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

:root{
--primary:#C85A3A;
--secondary:#B8860B;
--accent:#A0522D;
--background:#F5F5F0;
--card:#ffffff;
--border:#D4A574;
}

body{
margin:0;
font-family:Arial;
background:var(--background);
color:#1A1A1A;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 30px;
border-bottom:1px solid var(--border);
background:white;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo-box{
width:36px;
height:36px;
background:var(--primary);
color:white;
display:flex;
align-items:center;
justify-content:center;
border-radius:6px;
font-weight:bold;
}

.hero{
padding:70px 8%;
background:linear-gradient(#efe6dc,#f5f5f0);
}

.hero button{
background:var(--primary);
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
margin-top:20px;
}

.filters{
padding:20px 8%;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.filter-btn{
padding:8px 14px;
border:1px solid var(--border);
border-radius:6px;
cursor:pointer;
background:white;
}

.filter-btn.active{
background:var(--primary);
color:white;
}

.main{
display:grid;
grid-template-columns:260px 1fr 320px;
height:600px;
}

.sidebar{
background:white;
border-right:1px solid var(--border);
padding:20px;
overflow:auto;
}

.rightbar{
background:white;
border-left:1px solid var(--border);
padding:20px;
overflow:auto;
}

#map{
height:100%;
}

.products{
padding:40px 8%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.price{
color:var(--primary);
font-weight:bold;
margin-top:10px;
}

@media(max-width:1100px){

.main{
grid-template-columns:1fr;
height:400px;
}

.sidebar{
display:none;
}

.rightbar{
display:none;
}

}

</style>

</head>

<body>

<header>

<div class="logo">

<div class="logo-box">A</div>

<div>
<strong>Ateliê</strong><br>
<small>Povos Originários</small>
</div>

</div>

<nav>
Início | Produtos | Sobre
</nav>

</header>


<section class="hero">

<h1>Ateliê de Artesanatos</h1>

<p>
Celebrando a riqueza cultural e artística dos povos originários brasileiros.
</p>

<button onclick="scrollToProducts()">Explorar Catálogo</button>

</section>


<div class="filters" id="filters"></div>


<!-- MAPA + SIDE BARS -->

<div class="main">

<div class="sidebar">

<h3>Categorias</h3>

<div id="categories"></div>

</div>

<div id="map"></div>

<div class="rightbar">

<h3>Produtos do Coletivo</h3>

<div id="collectiveProducts">
Clique em um pino no mapa
</div>

</div>

</div>



<!-- GRID PRODUTOS -->

<section id="products" class="products"></section>



<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>


const products = [

{
id:"mesa",
name:"Mesas Karuara",
category:"Marcenaria",
origin:"Amaturá – AM",
price:0,
image:"https://picsum.photos/400/200?1",
lat:-3.3,
lng:-64.7
},

{
id:"cachimbo",
name:"Cachimbo Kariri Xocó",
category:"Artesanato Tradicional",
origin:"Kariri Xocó – AL",
price:0,
image:"https://picsum.photos/400/200?2",
lat:-10.2,
lng:-36.7
},

{
id:"colar",
name:"Colares Tikuna",
category:"Biojoias",
origin:"Tikuna – AM",
price:0,
image:"https://picsum.photos/400/200?3",
lat:-3.8,
lng:-70.2
},

{
id:"cacau",
name:"Cacau Warabú",
category:"Alimentos Artesanais",
origin:"Uruará – PA",
price:0,
image:"https://picsum.photos/400/200?4",
lat:-3.7,
lng:-53.7
}

]


const categories=[
"Todos",
"Marcenaria",
"Artesanato Tradicional",
"Biojoias",
"Alimentos Artesanais"
]


/* MAPA */

const map=L.map('map').setView([-10,-55],4)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map)

products.forEach(p=>{

const marker=L.marker([p.lat,p.lng]).addTo(map)

marker.on("click",()=>showCollective(p.origin))

})


/* PRODUTOS GRID */

const grid=document.getElementById("products")

function renderProducts(list){

grid.innerHTML=""

list.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<img src="${p.image}">

<div class="card-body">

<strong>${p.name}</strong>

<p>${p.origin}</p>

<div class="price">R$ ${p.price}</div>

</div>

</div>

`

})

}

renderProducts(products)



/* FILTROS */

const filterBox=document.getElementById("filters")

categories.forEach(cat=>{

const btn=document.createElement("div")

btn.className="filter-btn"

btn.textContent=cat

btn.onclick=()=>{

document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")

if(cat==="Todos"){
renderProducts(products)
}else{
renderProducts(products.filter(p=>p.category===cat))
}

}

filterBox.appendChild(btn)

})



/* COLETIVOS */

function showCollective(origin){

const box=document.getElementById("collectiveProducts")

const list=products.filter(p=>p.origin===origin)

box.innerHTML=""

list.forEach(p=>{

box.innerHTML+=`

<div style="margin-bottom:15px">

<strong>${p.name}</strong>

<p style="font-size:12px">${p.origin}</p>

</div>

`

})

}



/* SCROLL */

function scrollToProducts(){

document.getElementById("products")
.scrollIntoView({behavior:"smooth"})

}

</script>

</body>
</html>
