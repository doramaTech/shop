<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<title>Ateliê Povos Originários</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://cdn.tailwindcss.com"></script>

<style>

:root{
--primary:#C85A3A;
--secondary:#B8860B;
--accent:#A0522D;
--background:#F5F5F0;
}

body{
background:var(--background);
}

#map{
height:100%;
}

</style>

</head>

<body class="h-screen flex flex-col">

<!-- HEADER -->

<header class="flex justify-between items-center p-4 border-b bg-white">

<div class="flex items-center gap-3">

<div class="w-8 h-8 rounded bg-[color:var(--primary)] text-white flex items-center justify-center font-bold">
A
</div>

<div>
<strong>Ateliê</strong><br>
<small>Povos Originários</small>
</div>

</div>

<nav class="hidden md:flex gap-6">

<a>Início</a>
<a>Produtos</a>
<a>Sobre</a>

</nav>

</header>


<!-- MAIN -->

<div class="flex flex-1 overflow-hidden">

<!-- SIDEBAR ESQUERDA -->

<aside id="leftPanel"
class="w-64 bg-white border-r p-4 overflow-auto hidden lg:block">

<h3 class="font-bold mb-3">Categorias</h3>

<div id="categories"></div>

</aside>


<!-- MAPA -->

<div class="flex-1 relative">

<div id="map"></div>

</div>


<!-- SIDEBAR DIREITA -->

<aside id="rightPanel"
class="w-80 bg-white border-l p-4 overflow-auto hidden lg:block">

<h3 class="font-bold mb-3">
Produtos do Coletivo
</h3>

<div id="products"></div>

</aside>

</div>



<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>


/* =========================
PRODUTOS
========================= */

const products = [

{
id:"mesa-karuara-001",
name:"Mesas Karuara",
category:"Marcenaria",
origin:"Comunidade Amaturá – AM",
technique:"Marcenaria sustentável",
price:0,
lat:-3.3,
lng:-64.7
},

{
id:"cachimbo-kariri-001",
name:"Cachimbo Kariri Xocó",
category:"Artesanato Tradicional",
origin:"Kariri Xocó – AL",
technique:"Produção manual",
price:0,
lat:-10.2,
lng:-36.7
},

{
id:"colares-tikuna-001",
name:"Colares Tikuna",
category:"Biojoias",
origin:"Tikuna – AM",
technique:"Sementes naturais",
price:0,
lat:-3.8,
lng:-70.2
},

{
id:"cacau-warabu-001",
name:"Cacau Warabú",
category:"Alimentos Artesanais",
origin:"Uruará – PA",
technique:"Cacau artesanal",
price:0,
lat:-3.7,
lng:-53.7
},

{
id:"tambor-xama-001",
name:"Tambor Xamã",
category:"Instrumentos Tradicionais",
origin:"Projeto Social",
technique:"Bambu artesanal",
price:0,
lat:-23.5,
lng:-46.6
}

]

const categories = [

"Todos",
"Marcenaria",
"Artesanato Tradicional",
"Biojoias",
"Alimentos Artesanais",
"Instrumentos Tradicionais"

]



/* =========================
CATEGORIAS
========================= */

const categoryContainer =
document.getElementById("categories")

categories.forEach(cat=>{

const btn = document.createElement("div")

btn.textContent = cat

btn.className =
"p-2 mb-2 rounded cursor-pointer hover:bg-gray-100"

btn.onclick = ()=>filterCategory(cat)

categoryContainer.appendChild(btn)

})


/* =========================
MAPA
========================= */

const map = L.map('map').setView([-10,-55],4)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map)


let markers=[]

function loadMarkers(list){

markers.forEach(m=>map.removeLayer(m))

markers=[]

list.forEach(p=>{

const marker = L.marker([p.lat,p.lng]).addTo(map)

marker.on("click",()=>showProducts(p.origin))

markers.push(marker)

})

}

loadMarkers(products)



/* =========================
FILTRO
========================= */

function filterCategory(cat){

if(cat==="Todos"){

loadMarkers(products)

return

}

const filtered =
products.filter(p=>p.category===cat)

loadMarkers(filtered)

}



/* =========================
PRODUTOS DO COLETIVO
========================= */

function showProducts(origin){

const panel =
document.getElementById("products")

panel.innerHTML=""

const list =
products.filter(p=>p.origin===origin)

list.forEach(p=>{

const card=document.createElement("div")

card.className=
"border p-3 rounded mb-3"

card.innerHTML=`

<strong>${p.name}</strong>

<p class="text-sm mt-1">${p.origin}</p>

<p class="text-xs text-gray-500">
${p.technique}
</p>

`

panel.appendChild(card)

})

}



</script>

</body>
</html>
